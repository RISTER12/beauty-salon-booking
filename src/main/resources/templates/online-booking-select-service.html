<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор услуг - SEKTA X TECH V</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .center {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px 24px;
        }

        header a {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: white;
        }

        .arrow {
            font-size: 24px;
            font-weight: 400;
        }

        header img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #667eea;
        }

        #mainInfo {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        #address {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Main content */
        main {
            padding: 28px;
            flex: 1;
            max-height: 60vh;
            overflow-y: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 24px;
        }

        /* Category section */
        .category-section {
            margin-bottom: 28px;
        }

        .category-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            padding-bottom: 10px;
            margin-bottom: 16px;
            border-bottom: 2px solid #667eea;
            display: inline-block;
        }

        /* Service cards */
        .service-card {
            background: #f8fafc;
            border-radius: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .service-card:hover {
            background: #f1f5f9;
        }

        .service-card.selected {
            background: #e0e7ff;
            border: 1px solid #667eea;
        }

        .service-card label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            cursor: pointer;
        }

        .service-info {
            flex: 1;
        }

        .service-name {
            font-weight: 600;
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .service-details {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .service-duration {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .service-price {
            font-weight: 700;
            font-size: 18px;
            color: #667eea;
        }

        /* Checkbox */
        .service-card input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
            margin-left: 16px;
        }

        /* Footer */
        footer {
            padding: 20px 28px 28px;
            border-top: 1px solid #e2e8f0;
            background: white;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .wrapper {
                padding: 20px;
            }
            main {
                padding: 20px;
            }
            .service-card label {
                flex-wrap: wrap;
            }
            .service-price {
                width: 100%;
                margin-top: 10px;
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="center">
        <form action="/booking" method="get" id="servicesForm">
            <input type="hidden" name="employeeId" th:value="${employeeId}">
            <input type="hidden" name="slotId" th:value="${slotId}">

            <header>
                <a th:href="@{/booking(employeeId=${employeeId}, slotId=${slotId})}">
                    <div class="arrow">←</div>
                    <img src="../images/small-image.jpg" alt="Логотип">
                    <div>
                        <div id="mainInfo">SEKTA X TECH V</div>
                        <div id="address" th:text="${selectedSalon != null ? selectedSalon.fullAddress : 'улица Покровка, 44'}">
                            улица Покровка, 44
                        </div>
                    </div>
                </a>
            </header>

            <main>
                <h1>Выберите услуги</h1>

                <!-- Категории и услуги -->
                <div th:each="serviceGroup : ${servicesGroupByCategory}" class="category-section">
                    <div class="category-title" th:text="${serviceGroup.serviceCategoryResponseDto.categoryName}">Категория</div>

                    <div th:each="service : ${serviceGroup.serviceResponseDto}" class="service-card" th:attr="data-price=${service.price}, data-id=${service.id}">
                        <label>
                            <div class="service-info">
                                <div class="service-name" th:text="${service.name}">Название услуги</div>
                                <div class="service-details">
                                    <span class="service-duration">⏱ 1 ч 30 мин</span>
                                    <span>👤 Мастер</span>
                                </div>
                            </div>
                            <div class="service-price" th:text="${service.price} + ' ₽'">3500 ₽</div>
                            <input type="checkbox" name="serviceIds" th:value="${service.id}">
                        </label>
                    </div>
                </div>
            </main>

            <footer>
                <button type="submit" class="btn-submit">Выбрать услугу</button>
            </footer>
        </form>
    </div>
</div>

<script>
    // Выделение выбранных карточек и подсветка
    const checkboxes = document.querySelectorAll('input[name="serviceIds"]');
    const submitBtn = document.querySelector('.btn-submit');

    function updateSelection() {
        let hasSelected = false;

        checkboxes.forEach(checkbox => {
            const card = checkbox.closest('.service-card');
            if (checkbox.checked) {
                card.classList.add('selected');
                hasSelected = true;
            } else {
                card.classList.remove('selected');
            }
        });

        submitBtn.disabled = !hasSelected;
    }

    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', updateSelection);
    });

    // Инициализация
    updateSelection();
</script>

</body>
</html>
