<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор даты и времени - SEKTA X TECH V</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .center {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px 24px;
        }

        header a {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: white;
        }

        .arrow {
            font-size: 24px;
            font-weight: 400;
        }

        header img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #667eea;
        }

        #mainInfo {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        #address {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Main content */
        main {
            padding: 28px;
        }

        /* Calendar */
        #calendar {
            width: 100%;
        }

        #calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        #month {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
        }

        #arrows {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: #f1f5f9;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #e2e8f0;
        }

        /* Calendar grid header */
        #calendar-grid-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 12px;
        }

        .day-header {
            font-weight: 600;
            color: #64748b;
            font-size: 14px;
            padding: 8px;
        }

        /* Calendar grid */
        #calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 24px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: #1e293b;
            font-size: 15px;
        }

        .calendar-day:hover:not(.empty):not(.unavailable) {
            background: #e2e8f0;
            transform: scale(1.05);
        }

        .calendar-day.selected {
            background: #667eea;
            color: white;
        }

        .calendar-day.today {
            border: 2px solid #667eea;
        }

        .calendar-day.unavailable {
            opacity: 0.4;
            cursor: not-allowed;
            background: #f1f5f9;
        }

        .calendar-day.empty {
            background: transparent;
            cursor: default;
        }

        /* Time slots */
        .time-slots-container {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .time-slots-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 16px;
        }

        .slots-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .time-slot {
            background: #f1f5f9;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
        }

        .time-slot:hover {
            background: #e2e8f0;
        }

        .time-slot.selected {
            background: #667eea;
            color: white;
        }

        .no-slots {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
            background: #f8fafc;
            border-radius: 16px;
        }

        /* Footer */
        footer {
            padding: 20px 28px 28px;
            border-top: 1px solid #e2e8f0;
        }

        #go {
            display: none;
        }

        .btn-confirm {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .wrapper {
                padding: 20px;
            }
            main {
                padding: 20px;
            }
            .calendar-day {
                font-size: 13px;
            }
            .time-slot {
                padding: 6px 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="center">
        <form action="/booking" method="get" id="bookingForm">
            <input type="hidden" name="employeeId" th:value="${employeeId}">
            <input type="hidden" name="serviceIds" th:each="id : ${serviceIds}" th:value="${id}">
            <input type="hidden" name="slotId" id="selectedSlotId" value="">

            <header>
                <a th:href="@{/booking(serviceIds=${serviceIds}, employeeId=${employeeId})}">
                    <div class="arrow">←</div>
                    <img src="../images/small-image.jpg" alt="Логотип">
                    <div>
                        <div id="mainInfo">SEKTA X TECH V</div>
                        <div id="address" th:text="${selectedSalon != null ? selectedSalon.fullAddress : 'Выберите салон'}">
                            улица Покровка, 44
                        </div>
                    </div>
                </a>
            </header>

            <main>
                <div id="calendar">
                    <div id="calendar-header">
                        <span id="month"></span>
                        <div id="arrows">
                            <button type="button" class="nav-btn prev-month">←</button>
                            <button type="button" class="nav-btn next-month">→</button>
                        </div>
                    </div>
                    <div id="calendar-grid-header">
                        <div class="day-header">Пн</div>
                        <div class="day-header">Вт</div>
                        <div class="day-header">Ср</div>
                        <div class="day-header">Чт</div>
                        <div class="day-header">Пт</div>
                        <div class="day-header">Сб</div>
                        <div class="day-header">Вс</div>
                    </div>
                    <div id="calendar-grid"></div>
                    <div id="timeSlotsContainer" class="time-slots-container" style="display: none;"></div>
                </div>
            </main>

            <footer>
                <div id="go">
                    <button type="button" id="confirm-button" class="btn-confirm">Подтвердить запись</button>
                </div>
            </footer>
        </form>
    </div>
</div>

<script src="../js/calendar.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    window.selectedEmployeeId = [[${employeeId}]];
    window.selectedServiceIds = [[${serviceIds}]];
    window.selectedSalonAddress = [[${selectedSalon != null ? selectedSalon.fullAddress : ''}]];
    /*]]>*/
</script>
</body>
</html>
