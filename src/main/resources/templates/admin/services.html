<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление услугами</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .btn-add {
            background: #f97316;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-add-category {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            margin-left: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #1e293b;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-save {
            background: #f97316;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }

        .btn-edit {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 8px;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .price {
            font-weight: 600;
            color: #f97316;
        }

        .category-list {
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
        }
    </style>
</head>
<body>

<div class="admin-layout">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-content">
        <div class="content-header">
            <h1>Управление услугами</h1>
            <p class="welcome-text">Добавление, редактирование и удаление услуг и категорий</p>
        </div>

        <div>
            <button class="btn-add" id="addServiceBtn">+ Добавить услугу</button>
            <button class="btn-add-category" id="addCategoryBtn">+ Добавить категорию</button>
        </div>

        <!-- Список услуг -->
        <div class="table-container">
            <h3>Услуги</h3>
            <table class="data-table" id="servicesTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Категория</th>
                    <th>Цена</th>
                    <th>Салон</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody id="servicesTableBody">
                <tr><td colspan="6" style="text-align: center;">Загрузка...</td></table>
            </tbody>
            </table>
        </div>

        <!-- Список категорий -->
        <div class="category-list">
            <div class="category-header">
                <h3>Категории услуг</h3>
                <button class="btn-add-category" id="addCategoryBtn2" style="font-size: 12px; padding: 5px 10px;">+ Добавить</button>
            </div>
            <div id="categoriesList">
                <div style="text-align: center; padding: 20px;">Загрузка категорий...</div>
            </div>
        </div>
    </main>
</div>

<!-- Модальное окно для услуги -->
<div id="serviceModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="serviceModalTitle">Добавить услугу</h2>
            <button onclick="closeServiceModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>

        <form id="serviceForm">
            <input type="hidden" id="serviceId">

            <div class="form-group">
                <label>Название *</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>Короткое название</label>
                <input type="text" id="shortName">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Категория</label>
                    <select id="categoryId">
                        <option value="">Выберите категорию</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Цена *</label>
                    <input type="number" step="0.01" id="price" required>
                </div>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea id="description" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Краткое описание</label>
                <textarea id="shortDescription" rows="2"></textarea>
            </div>

            <button type="submit" class="btn-save">Сохранить</button>
        </form>
    </div>
</div>

<!-- Модальное окно для категории -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="categoryModalTitle">Добавить категорию</h2>
            <button onclick="closeCategoryModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>

        <form id="categoryForm">
            <input type="hidden" id="categoryEditId">

            <div class="form-group">
                <label>Название категории *</label>
                <input type="text" id="categoryName" required>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea id="categoryDescription" rows="3"></textarea>
            </div>

            <button type="submit" class="btn-save">Сохранить</button>
        </form>
    </div>
</div>

<script>
    let categories = [];

    async function getCurrentSalon() {
        try {
            const response = await fetch('/admin/api/current-salon');
            const data = await response.json();
            return data && data.id ? data : null;
        } catch (e) {
            console.error('Error getting current salon:', e);
            return null;
        }
    }

    // Загрузка категорий
    async function loadCategories() {
        try {
            const response = await fetch('/admin/api/categories');
            categories = await response.json();

            const select = document.getElementById('categoryId');
            select.innerHTML = '<option value="">Выберите категорию</option>' +
                categories.filter(cat => cat.active).map(cat =>
                    `<option value="${cat.id}">${cat.categoryName}</option>`
                ).join('');

            const container = document.getElementById('categoriesList');
            if (categories.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px;">Нет категорий</div>';
                return;
            }

            container.innerHTML = categories.map(cat => `
                <div class="category-item">
                    <div>
                        <strong>${cat.categoryName}</strong>
                        ${cat.description ? `<div style="font-size: 12px; color: #64748b;">${cat.description}</div>` : ''}
                    </div>
                    <div>
                        <button class="btn-edit" onclick="editCategory(${cat.id})">Ред.</button>
                        <button class="btn-delete" onclick="deleteCategory(${cat.id})">Уд.</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            console.error('Error loading categories:', e);
        }
    }

    // Загрузка услуг с учётом салона
    async function loadServices() {
        try {
            const currentSalon = await getCurrentSalon();
            let url = '/admin/api/services';
            if (currentSalon && currentSalon.id) {
                url = `/admin/api/services/by-salon?salonId=${currentSalon.id}`;
            }

            const response = await fetch(url);
            const services = await response.json();

            const tbody = document.getElementById('servicesTableBody');
            if (!services || services.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Нет услуг в выбранном салоне</td></tr>';
                return;
            }

            tbody.innerHTML = services.map(service => `
                <tr>
                    <td>${service.id}</td>
                    <td>${service.name}</td>
                    <td>${service.categoryName || '-'}</td>
                    <td class="price">${service.price} ₽</td>
                    <td>${service.salonName || '-'}</td>
                    <td>
                        <button class="btn-edit" onclick="editService(${service.id})">Ред.</button>
                        <button class="btn-delete" onclick="deleteService(${service.id})">Уд.</button>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            console.error('Error loading services:', e);
            document.getElementById('servicesTableBody').innerHTML = '<tr><td colspan="6" style="text-align: center;">Ошибка загрузки</td></tr>';
        }
    }

    // Услуги: редактирование
    async function editService(id) {
        try {
            const response = await fetch(`/admin/api/services/${id}`);
            const service = await response.json();

            document.getElementById('serviceId').value = service.id;
            document.getElementById('name').value = service.name;
            document.getElementById('shortName').value = service.shortName || '';
            document.getElementById('price').value = service.price;
            document.getElementById('description').value = service.description || '';
            document.getElementById('shortDescription').value = service.shortDescription || '';

            const categorySelect = document.getElementById('categoryId');
            if (categorySelect && service.categoryId) {
                categorySelect.value = service.categoryId;
            }

            document.getElementById('serviceModalTitle').textContent = 'Редактировать услугу';
            document.getElementById('serviceModal').style.display = 'flex';
        } catch (e) {
            console.error('Error loading service:', e);
            alert('Ошибка загрузки данных услуги');
        }
    }

    // Услуги: удаление
    async function deleteService(id) {
        if (confirm('Вы уверены, что хотите удалить эту услугу?')) {
            try {
                const response = await fetch(`/admin/api/services/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('Услуга удалена');
                    loadServices();
                } else {
                    alert('Ошибка при удалении');
                }
            } catch (e) {
                console.error('Error deleting service:', e);
                alert('Ошибка при удалении');
            }
        }
    }

    // Категории: редактирование
    async function editCategory(id) {
        try {
            const response = await fetch(`/admin/api/categories/${id}`);
            const category = await response.json();

            document.getElementById('categoryEditId').value = category.id;
            document.getElementById('categoryName').value = category.categoryName;
            document.getElementById('categoryDescription').value = category.description || '';

            document.getElementById('categoryModalTitle').textContent = 'Редактировать категорию';
            document.getElementById('categoryModal').style.display = 'flex';
        } catch (e) {
            console.error('Error loading category:', e);
            alert('Ошибка загрузки данных категории');
        }
    }

    // Категории: удаление
    async function deleteCategory(id) {
        if (confirm('Вы уверены, что хотите удалить эту категорию?')) {
            try {
                const response = await fetch(`/admin/api/categories/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('Категория удалена');
                    loadCategories();
                } else {
                    alert('Ошибка при удалении');
                }
            } catch (e) {
                console.error('Error deleting category:', e);
                alert('Ошибка при удалении');
            }
        }
    }

    // Открытие модального окна для добавления услуги
    document.getElementById('addServiceBtn').addEventListener('click', () => {
        document.getElementById('serviceForm').reset();
        document.getElementById('serviceId').value = '';
        document.getElementById('serviceModalTitle').textContent = 'Добавить услугу';
        document.getElementById('serviceModal').style.display = 'flex';
    });

    // Открытие модального окна для добавления категории
    function openCategoryModal() {
        document.getElementById('categoryForm').reset();
        document.getElementById('categoryEditId').value = '';
        document.getElementById('categoryModalTitle').textContent = 'Добавить категорию';
        document.getElementById('categoryModal').style.display = 'flex';
    }

    document.getElementById('addCategoryBtn').addEventListener('click', openCategoryModal);
    document.getElementById('addCategoryBtn2').addEventListener('click', openCategoryModal);

    // Сохранение услуги
    document.getElementById('serviceForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const serviceId = document.getElementById('serviceId').value;
        const data = {
            name: document.getElementById('name').value,
            shortName: document.getElementById('shortName').value,
            price: parseFloat(document.getElementById('price').value),
            description: document.getElementById('description').value,
            shortDescription: document.getElementById('shortDescription').value,
            categoryId: document.getElementById('categoryId').value ? parseInt(document.getElementById('categoryId').value) : null
        };

        const url = serviceId ? `/admin/api/services/${serviceId}` : '/admin/api/services';
        const method = serviceId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert(serviceId ? 'Услуга обновлена' : 'Услуга добавлена');
                closeServiceModal();
                loadServices();
            } else {
                alert('Ошибка при сохранении');
            }
        } catch (e) {
            console.error('Error saving service:', e);
            alert('Ошибка при сохранении');
        }
    });

    // Сохранение категории
    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const categoryId = document.getElementById('categoryEditId').value;
        const data = {
            categoryName: document.getElementById('categoryName').value,
            description: document.getElementById('categoryDescription').value
        };

        const url = categoryId ? `/admin/api/categories/${categoryId}` : '/admin/api/categories';
        const method = categoryId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert(categoryId ? 'Категория обновлена' : 'Категория добавлена');
                closeCategoryModal();
                loadCategories();
            } else {
                alert('Ошибка при сохранении');
            }
        } catch (e) {
            console.error('Error saving category:', e);
            alert('Ошибка при сохранении');
        }
    });

    function closeServiceModal() {
        document.getElementById('serviceModal').style.display = 'none';
    }

    function closeCategoryModal() {
        document.getElementById('categoryModal').style.display = 'none';
    }

    window.onclick = function(event) {
        const serviceModal = document.getElementById('serviceModal');
        const categoryModal = document.getElementById('categoryModal');
        if (event.target === serviceModal) closeServiceModal();
        if (event.target === categoryModal) closeCategoryModal();
    };

    // Инициализация
    loadCategories();
    loadServices();
</script>

</body>
</html>
