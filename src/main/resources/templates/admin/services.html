<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление услугами</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .btn-add {
            background: #f97316;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-add-category {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            margin-left: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #1e293b;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-save {
            background: #f97316;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }

        .btn-edit {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 8px;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .price {
            font-weight: 600;
            color: #f97316;
        }

        .category-select-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .category-select {
            flex: 1;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        .category-actions-inline {
            display: flex;
            gap: 6px;
        }

        .btn-add-category-inline,
        .btn-edit-category-inline,
        .btn-delete-category-inline {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-add-category-inline {
            background: #10b981;
            color: white;
        }

        .btn-add-category-inline:hover {
            background: #059669;
        }

        .btn-edit-category-inline {
            background: #3b82f6;
            color: white;
        }

        .btn-edit-category-inline:hover {
            background: #2563eb;
        }

        .btn-delete-category-inline {
            background: #ef4444;
            color: white;
        }

        .btn-delete-category-inline:hover {
            background: #dc2626;
        }

        .category-manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s;
        }

        .category-manage-item:hover {
            background: #f8fafc;
        }

        .category-manage-info {
            flex: 1;
        }

        .category-manage-name {
            font-weight: 600;
            color: #1e293b;
        }

        .category-manage-description {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .category-manage-actions {
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="admin-layout">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-content">
        <div class="content-header">
            <h1>Управление услугами</h1>
            <p class="welcome-text">Добавление, редактирование и удаление услуг</p>
        </div>

        <div>
            <button class="btn-add" id="addServiceBtn">+ Добавить услугу</button>
        </div>

        <!-- Список услуг -->
        <div class="table-container">
            <h3>Услуги</h3>
            <table class="data-table" id="servicesTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Категория</th>
                    <th>Цена</th>
                    <th>Салон</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody id="servicesTableBody">
                <tr><td colspan="6" style="text-align: center;">Загрузка...<\/td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Модальное окно для услуги -->
<div id="serviceModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="serviceModalTitle">Добавить услугу</h2>
            <button onclick="closeServiceModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>

        <form id="serviceForm">
            <input type="hidden" id="serviceId">

            <div class="form-group">
                <label>Название *</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Категория</label>
                    <select id="categoryId" class="category-select" style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
                        <option value="">Выберите категорию</option>
                    </select>
                    <div style="display: flex; gap: 8px; margin-top: 10px;">
                        <button type="button" class="btn-add-category-inline" id="inlineAddCategoryBtn" style="flex: 1; background: #10b981; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;">+ Новая</button>
                        <button type="button" class="btn-edit-category-inline" id="inlineEditCategoryBtn" style="flex: 1; background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;">✏️ Редактировать</button>
                        <button type="button" class="btn-delete-category-inline" id="inlineDeleteCategoryBtn" style="flex: 1; background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;">🗑️ Удалить</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Цена *</label>
                    <input type="number" step="0.01" id="price" required>
                </div>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea id="description" rows="3" placeholder="Полное описание услуги"></textarea>
            </div>

            <button type="submit" class="btn-save">Сохранить</button>
        </form>
    </div>
</div>

<!-- Модальное окно для управления категориями -->
<div id="categoriesManageModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <h2>Управление категориями услуг</h2>
            <button onclick="closeCategoriesManageModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="btn-add-category" id="addNewCategoryBtn" style="width: 100%;">+ Добавить новую категорию</button>
        </div>

        <div id="categoriesManageList" style="max-height: 400px; overflow-y: auto;">
            <div style="text-align: center; padding: 20px;">Загрузка...</div>
        </div>
    </div>
</div>

<!-- Модальное окно для добавления/редактирования категории -->
<div id="categorySimpleModal" class="modal">
    <div class="modal-content" style="max-width: 450px;">
        <div class="modal-header">
            <h2 id="categorySimpleModalTitle">Добавить категорию</h2>
            <button onclick="closeCategorySimpleModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>

        <form id="categorySimpleForm">
            <input type="hidden" id="categorySimpleEditId">

            <div class="form-group">
                <label>Название категории *</label>
                <input type="text" id="categorySimpleName" required>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea id="categorySimpleDescription" rows="2"></textarea>
            </div>

            <button type="submit" class="btn-save">Сохранить</button>
        </form>
    </div>
</div>

<script>
    let categories = [];

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function getCurrentSalon() {
        try {
            const response = await fetch('/admin/api/current-salon');
            const data = await response.json();
            return data && data.id ? data : null;
        } catch (e) {
            console.error('Error getting current salon:', e);
            return null;
        }
    }

    // Загрузка категорий для select
    async function loadCategoriesForSelect() {
        try {
            const response = await fetch('/admin/api/categories');
            categories = await response.json();

            const select = document.getElementById('categoryId');
            select.innerHTML = '<option value="">Выберите категорию</option>' +
                categories.filter(cat => cat.active).map(cat =>
                    `<option value="${cat.id}">${escapeHtml(cat.categoryName)}</option>`
                ).join('');
        } catch (e) {
            console.error('Error loading categories:', e);
        }
    }

    // Загрузка услуг
    async function loadServices() {
        try {
            const currentSalon = await getCurrentSalon();
            let url = '/admin/api/services';
            if (currentSalon && currentSalon.id) {
                url = `/admin/api/services/by-salon?salonId=${currentSalon.id}`;
            }

            const response = await fetch(url);
            const services = await response.json();

            const tbody = document.getElementById('servicesTableBody');
            if (!services || services.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Нет услуг в выбранном салоне</td></tr>';
                return;
            }

            tbody.innerHTML = services.map(service => `
                <tr>
                    <td>${service.id}</td>
                    <td>${escapeHtml(service.name)}</td>
                    <td>${escapeHtml(service.categoryName || '-')}</td>
                    <td class="price">${service.price} ₽</td>
                    <td>${escapeHtml(service.salonName || '-')}</td>
                    <td>
                        <button class="btn-edit" onclick="editService(${service.id})">Ред.</button>
                        <button class="btn-delete" onclick="deleteService(${service.id})">Уд.</button>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            console.error('Error loading services:', e);
            document.getElementById('servicesTableBody').innerHTML = '<tr><td colspan="6" style="text-align: center;">Ошибка загрузки</td></tr>';
        }
    }

    // Услуги: редактирование
    async function editService(id) {
        try {
            const response = await fetch(`/admin/api/services/${id}`);
            const service = await response.json();

            document.getElementById('serviceId').value = service.id;
            document.getElementById('name').value = service.name;
            document.getElementById('price').value = service.price;
            document.getElementById('description').value = service.description || '';

            const categorySelect = document.getElementById('categoryId');
            if (categorySelect && service.categoryId) {
                categorySelect.value = service.categoryId;
            }

            document.getElementById('serviceModalTitle').textContent = 'Редактировать услугу';
            document.getElementById('serviceModal').style.display = 'flex';
        } catch (e) {
            console.error('Error loading service:', e);
            alert('Ошибка загрузки данных услуги');
        }
    }

    // Удаление услуги
    async function deleteService(id) {
        if (confirm('Вы уверены, что хотите удалить эту услугу?')) {
            try {
                const response = await fetch(`/admin/api/services/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('Услуга удалена');
                    loadServices();
                } else {
                    alert('Ошибка при удалении');
                }
            } catch (e) {
                console.error('Error deleting service:', e);
                alert('Ошибка при удалении');
            }
        }
    }

    // Открытие модального окна управления категориями
    function openCategoriesManageModal() {
        loadCategoriesManageList();
        document.getElementById('categoriesManageModal').style.display = 'flex';
    }

    function closeCategoriesManageModal() {
        document.getElementById('categoriesManageModal').style.display = 'none';
    }

    // Загрузка списка категорий для управления
    async function loadCategoriesManageList() {
        try {
            const response = await fetch('/admin/api/categories');
            const categoriesList = await response.json();

            const container = document.getElementById('categoriesManageList');
            if (!categoriesList || categoriesList.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px;">Нет категорий. Нажмите "+ Добавить"</div>';
                return;
            }

            container.innerHTML = categoriesList.map(cat => `
                <div class="category-manage-item">
                    <div class="category-manage-info">
                        <div class="category-manage-name">${escapeHtml(cat.categoryName)}</div>
                        ${cat.description ? `<div class="category-manage-description">${escapeHtml(cat.description)}</div>` : ''}
                    </div>
                    <div class="category-manage-actions">
                        <button class="btn-edit" onclick="openEditCategoryModal(${cat.id})">✏️ Ред.</button>
                        <button class="btn-delete" onclick="deleteCategoryFromManage(${cat.id})">🗑️ Уд.</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            console.error('Error loading categories:', e);
        }
    }

    // Открытие модального окна для добавления категории
    function openAddCategoryModal() {
        document.getElementById('categorySimpleEditId').value = '';
        document.getElementById('categorySimpleName').value = '';
        document.getElementById('categorySimpleDescription').value = '';
        document.getElementById('categorySimpleModalTitle').textContent = 'Добавить категорию';
        document.getElementById('categorySimpleModal').style.display = 'flex';
    }

    // Открытие модального окна для редактирования категории
    async function openEditCategoryModal(id) {
        try {
            const response = await fetch(`/admin/api/categories/${id}`);
            const category = await response.json();

            document.getElementById('categorySimpleEditId').value = category.id;
            document.getElementById('categorySimpleName').value = category.categoryName;
            document.getElementById('categorySimpleDescription').value = category.description || '';
            document.getElementById('categorySimpleModalTitle').textContent = 'Редактировать категорию';
            document.getElementById('categorySimpleModal').style.display = 'flex';
        } catch (e) {
            console.error('Error loading category:', e);
            alert('Ошибка загрузки категории');
        }
    }

    function closeCategorySimpleModal() {
        document.getElementById('categorySimpleModal').style.display = 'none';
    }

    // Сохранение категории
    async function saveCategorySimple() {
        const categoryId = document.getElementById('categorySimpleEditId').value;
        const data = {
            categoryName: document.getElementById('categorySimpleName').value,
            description: document.getElementById('categorySimpleDescription').value
        };

        if (!data.categoryName) {
            alert('Введите название категории');
            return;
        }

        const url = categoryId ? `/admin/api/categories/${categoryId}` : '/admin/api/categories';
        const method = categoryId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert(categoryId ? 'Категория обновлена' : 'Категория добавлена');
                closeCategorySimpleModal();
                loadCategoriesManageList();
                loadCategoriesForSelect();
                loadServices();
            } else {
                alert('Ошибка при сохранении');
            }
        } catch (e) {
            console.error('Error saving category:', e);
            alert('Ошибка при сохранении');
        }
    }

    // Удаление категории из управления
    async function deleteCategoryFromManage(id) {
        const category = categories.find(c => c.id === id);
        if (confirm(`Вы уверены, что хотите удалить категорию "${category?.categoryName || id}"?`)) {
            try {
                const response = await fetch(`/admin/api/categories/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('Категория удалена');
                    loadCategoriesManageList();
                    loadCategoriesForSelect();
                    loadServices();
                } else {
                    alert('Ошибка при удалении');
                }
            } catch (e) {
                console.error('Error deleting category:', e);
                alert('Ошибка при удалении');
            }
        }
    }

    // Сохранение услуги
    document.getElementById('serviceForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const serviceId = document.getElementById('serviceId').value;
        const currentSalon = await getCurrentSalon();
        const salonId = currentSalon ? currentSalon.id : null;

        if (!salonId) {
            alert('Сначала выберите салон в боковом меню');
            return;
        }

        const data = {
            name: document.getElementById('name').value,
            price: parseFloat(document.getElementById('price').value),
            description: document.getElementById('description').value,
            categoryId: document.getElementById('categoryId').value ? parseInt(document.getElementById('categoryId').value) : null,
            salonId: salonId
        };

        const url = serviceId ? `/admin/api/services/${serviceId}` : '/admin/api/services';
        const method = serviceId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert(serviceId ? 'Услуга обновлена' : 'Услуга добавлена');
                closeServiceModal();
                loadServices();
            } else {
                const error = await response.text();
                alert('Ошибка при сохранении: ' + error);
            }
        } catch (e) {
            console.error('Error saving service:', e);
            alert('Ошибка при сохранении');
        }
    });

    function closeServiceModal() {
        document.getElementById('serviceModal').style.display = 'none';
    }

    // Обработчики inline кнопок для категорий
    document.getElementById('inlineAddCategoryBtn').addEventListener('click', openAddCategoryModal);
    document.getElementById('inlineEditCategoryBtn').addEventListener('click', async () => {
        const select = document.getElementById('categoryId');
        const selectedId = select.value;
        if (!selectedId) {
            alert('Сначала выберите категорию');
            return;
        }
        await openEditCategoryModal(parseInt(selectedId));
    });
    document.getElementById('inlineDeleteCategoryBtn').addEventListener('click', async () => {
        const select = document.getElementById('categoryId');
        const selectedId = select.value;
        if (!selectedId) {
            alert('Сначала выберите категорию');
            return;
        }
        await deleteCategoryFromManage(parseInt(selectedId));
    });

    // Обработчики для модальных окон
    document.getElementById('addServiceBtn').addEventListener('click', () => {
        document.getElementById('serviceForm').reset();
        document.getElementById('serviceId').value = '';
        document.getElementById('serviceModalTitle').textContent = 'Добавить услугу';
        document.getElementById('serviceModal').style.display = 'flex';
    });

    document.getElementById('categorySimpleForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await saveCategorySimple();
    });

    // Инициализация
    loadCategoriesForSelect();
    loadServices();
</script>

</body>
</html>
