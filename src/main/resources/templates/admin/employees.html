<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Управление мастерами</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <style>
    .btn-add {
      background: #f97316;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #1e293b;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .btn-save {
      background: #f97316;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
    }

    .btn-edit {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 8px;
    }

    .btn-delete {
      background: #ef4444;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .employee-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .status-active {
      color: #10b981;
      font-weight: 500;
    }

    .status-inactive {
      color: #ef4444;
      font-weight: 500;
    }

    .services-list {
      max-width: 200px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

  <main class="admin-content">
    <div class="content-header">
      <h1>Управление мастерами</h1>
      <p class="welcome-text">Добавление, редактирование и удаление мастеров</p>
    </div>

    <button class="btn-add" id="addEmployeeBtn">+ Добавить мастера</button>

    <div class="table-container">
      <table class="data-table" id="employeesTable">
        <thead>
        <tr>
          <th>ID</th>
          <th>Фото</th>
          <th>ФИО</th>
          <th>Должность</th>
          <th>Опыт</th>
          <th>Услуги</th>
          <th>Статус</th>
          <th>Действия</th>
        </tr>
        </thead>
        <tbody id="employeesTableBody">
        <tr><td colspan="8" style="text-align: center;">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Модальное окно для добавления/редактирования -->
<div id="employeeModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Добавить мастера</h2>
      <button onclick="closeModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
    </div>

    <form id="employeeForm">
      <input type="hidden" id="employeeId">

      <div class="form-row">
        <div class="form-group">
          <label>Имя *</label>
          <input type="text" id="firstName" required>
        </div>
        <div class="form-group">
          <label>Фамилия *</label>
          <input type="text" id="lastName" required>
        </div>
      </div>

      <div class="form-group">
        <label>Отчество</label>
        <input type="text" id="middleName">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Должность *</label>
          <input type="text" id="jobTitle" required>
        </div>
        <div class="form-group">
          <label>Опыт (лет)</label>
          <input type="number" id="experienceYears" value="0">
        </div>
      </div>

      <div class="form-group">
        <label>Видим на сайте</label>
        <select id="visibleOnWebsite">
          <option value="true">Да</option>
          <option value="false">Нет</option>
        </select>
      </div>

      <div class="form-group">
        <label>Средний рейтинг</label>
        <input type="number" step="0.1" id="averageRating" value="0">
      </div>

      <button type="submit" class="btn-save">Сохранить</button>
    </form>
  </div>
</div>

<script>
  let currentEmployeeId = null;

  // Добавьте эту функцию в начало
  async function getCurrentSalon() {
    try {
      const response = await fetch('/admin/api/current-salon');
      const data = await response.json();
      return data && data.id ? data : null;
    } catch (e) {
      console.error('Error getting current salon:', e);
      return null;
    }
  }

  async function loadEmployees() {
    try {
      const currentSalon = await getCurrentSalon();
      let url = '/admin/api/employees';
      if (currentSalon && currentSalon.id) {
        url = `/admin/api/employees/by-salon?salonId=${currentSalon.id}`;
      }

      console.log('Загрузка сотрудников по URL:', url);

      const response = await fetch(url);
      const employees = await response.json();

      console.log('Загружены сотрудники:', employees);

      const tbody = document.getElementById('employeesTableBody');
      if (!employees || employees.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">Нет мастеров в выбранном салоне</td></tr>';
        return;
      }

      tbody.innerHTML = employees.map(emp => `
        <tr>
            <td>${emp.id}</td>
            <td>${emp.fullName || emp.firstName + ' ' + emp.lastName}</td>
            <td>${emp.jobTitle || '-'}</td>
            <td>${emp.experienceYears || 0} лет</td>
            <td><span class="status-${emp.status === 'ACTIVE' ? 'active' : 'inactive'}">${emp.status || 'ACTIVE'}</span></td>
            <td>
              <button class="btn-edit" onclick="editEmployee(${emp.id})">Ред.</button>
              <button class="btn-delete" onclick="deleteEmployee(${emp.id})">Уд.</button>
            </td>
         </>
      `).join('');
    } catch (e) {
      console.error('Error loading employees:', e);
      document.getElementById('employeesTableBody').innerHTML = '<tr><td colspan="8" style="text-align: center;">Ошибка загрузки</td></tr>';
    }
  }

  async function editEmployee(id) {
    try {
      const response = await fetch(`/admin/api/employees/${id}`);
      const emp = await response.json();

      document.getElementById('employeeId').value = emp.id;
      document.getElementById('firstName').value = emp.firstName;
      document.getElementById('lastName').value = emp.lastName;
      document.getElementById('middleName').value = emp.middleName || '';
      document.getElementById('jobTitle').value = emp.jobTitle || '';
      document.getElementById('experienceYears').value = emp.experienceYears || 0;
      document.getElementById('visibleOnWebsite').value = emp.visibleOnWebsite ? 'true' : 'false';
      document.getElementById('averageRating').value = emp.averageRating || 0;

      document.getElementById('modalTitle').textContent = 'Редактировать мастера';
      document.getElementById('employeeModal').style.display = 'flex';
    } catch (e) {
      console.error('Error loading employee:', e);
      alert('Ошибка загрузки данных мастера');
    }
  }

  async function deleteEmployee(id) {
    if (confirm('Вы уверены, что хотите удалить этого мастера?')) {
      try {
        const response = await fetch(`/admin/api/employees/${id}`, { method: 'DELETE' });
        if (response.ok) {
          alert('Мастер удалён');
          await loadEmployees();
        } else {
          alert('Ошибка при удалении');
        }
      } catch (e) {
        console.error('Error deleting employee:', e);
        alert('Ошибка при удалении');
      }
    }
  }

  document.getElementById('addEmployeeBtn').addEventListener('click', () => {
    document.getElementById('employeeForm').reset();
    document.getElementById('employeeId').value = '';
    document.getElementById('modalTitle').textContent = 'Добавить мастера';
    document.getElementById('employeeModal').style.display = 'flex';
  });

  document.getElementById('employeeForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const employeeId = document.getElementById('employeeId').value;

    // Получаем текущий выбранный салон
    const currentSalon = await getCurrentSalon();
    const salonId = currentSalon ? currentSalon.id : null;

    if (!salonId) {
      alert('Сначала выберите салон в боковом меню');
      return;
    }

    const data = {
      firstName: document.getElementById('firstName').value,
      lastName: document.getElementById('lastName').value,
      middleName: document.getElementById('middleName').value || null,
      jobTitle: document.getElementById('jobTitle').value,
      experienceYears: parseInt(document.getElementById('experienceYears').value) || 0,
      isVisibleOnWebsite: document.getElementById('visibleOnWebsite').value === 'true',
      averageRating: parseFloat(document.getElementById('averageRating').value) || 0,
      statusId: 1,
      salonId: salonId  // ✅ Используем салон из сессии
    };

    const url = employeeId ? `/admin/api/employees/${employeeId}` : '/admin/api/employees';
    const method = employeeId ? 'PUT' : 'POST';

    try {
      const response = await fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        alert(employeeId ? 'Мастер обновлён' : 'Мастер добавлен');
        closeModal();
        loadEmployees();
      } else {
        alert('Ошибка при сохранении');
      }
    } catch (e) {
      console.error('Error saving employee:', e);
      alert('Ошибка при сохранении');
    }
  });

  function closeModal() {
    document.getElementById('employeeModal').style.display = 'none';
  }

  window.onclick = function(event) {
    const modal = document.getElementById('employeeModal');
    if (event.target === modal) closeModal();
  };

  // Загружаем сотрудников
  loadEmployees();
</script>
</body>
</html>
