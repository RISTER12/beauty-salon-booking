databaseChangeLog:
  - changeSet:
      id: create-cancellation-role-table
      author: Il'ia Kuz'min
      preConditions:
        - not:
            tableExists:
              tableName: cancellation_role
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: cancellation_role
            remarks: "Список тех кто может отменить запись"
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_cancellation_role
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: role_name
                  type: VARCHAR(255)
                  remarks: "Кто именно отменил запись, (''client'', ''employee'', ''system'', ''admin'')"
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: "CURRENT_TIMESTAMP"
      rollback:
        - dropTable:
            tableName: cancellation_role