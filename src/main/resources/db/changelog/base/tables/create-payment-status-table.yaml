databaseChangeLog:
  - changeSet:
      id: create-payment-status-table
      author: Il'ia Kuz'min
      preConditions:
        - not:
            tableExists:
              tableName: payment_status
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: payment_status
            remarks: "Справочник для платежей"
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_payment_status
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: status_name
                  type: VARCHAR(255)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
      rollback:
        - dropTable:
            tableName: payment_status