databaseChangeLog:
  - changeSet:
      id: create-address-table
      author: Il'ia Kuz'min
      preConditions:
        - not:
            tableExists:
              tableName: address
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: address
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_address
                  name: id
                  type: BIGINT
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: full_address
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: city
                  type: VARCHAR(100)
              - column:
                  name: district
                  type: VARCHAR(100)
                  remarks: "Район города"
              - column:
                  constraints:
                    nullable: false
                  name: street
                  type: VARCHAR(100)
              - column:
                  constraints:
                    nullable: false
                  name: building
                  type: VARCHAR(10)
              - column:
                  name: apartment
                  type: VARCHAR(10)
                  remarks: "Квартира/Офис"
              - column:
                  name: metro_station
                  type: VARCHAR(100)
              - column:
                  constraints:
                    nullable: false
                  name: postal_code
                  type: VARCHAR(10)
                  remarks: "Почтовый индекс"
              - column:
                  constraints:
                    nullable: false
                  name: latitude
                  type: DECIMAL
                  remarks: "Широта для карты"
              - column:
                  constraints:
                    nullable: false
                  name: longitude
                  type: DECIMAL
                  remarks: "Долгота для карты"
              - column:
                  constraints:
                    nullable: false
                  name: map_url
                  type: TEXT
                  remarks: "Ссылка на карту"
              - column:
                  name: description
                  type: VARCHAR(500)
                  remarks: "Описание адреса, например: вход со стороны ул. Тухачевского"
      rollback:
        - dropTable:
            tableName: address