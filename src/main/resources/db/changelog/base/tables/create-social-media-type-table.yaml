databaseChangeLog:
  - changeSet:
      id: create-social-media-type-table
      author: Il'ia Kuz'min
      preConditions:
        - not:
            tableExists:
              tableName: social_media_type
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: social_media_type
            remarks: "Тип социальной сети"
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_social_media_type
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: type_name
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: base_url
                  type: VARCHAR(255)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: "CURRENT_TIMESTAMP"
      rollback:
        - dropTable:
            tableName: social_media_type