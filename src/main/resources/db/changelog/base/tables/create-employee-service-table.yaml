databaseChangeLog:
  - changeSet:
      id: create-employee-service-table
      author: Il'ia Kuz'min
      preConditions:
        - not:
            tableExists:
              tableName: employee_service
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: employee_service
            columns:
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: price
                  type: DECIMAL
                  remarks: "Цена этой услуги у этого мастера"
              - column:
                  name: duration_minutes
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_employee_service
                  name: employee_id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_employee_service
                  name: service_id
                  type: BIGINT
      rollback:
        - dropTable:
            tableName: employee_service