databaseChangeLog:
  - changeSet:
      id: create-notification-table
      author: Il'ia Kuz'min
      preConditions:
        - not:
            tableExists:
              tableName: notification
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: notification
            remarks: "Уведомления"
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_notification
                  name: id
                  type: BIGINT
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  constraints:
                    nullable: false
                  name: client_id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: notification_status_id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: message
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: metadata
                  type: jsonb
      rollback:
        - dropTable:
            tableName: notification