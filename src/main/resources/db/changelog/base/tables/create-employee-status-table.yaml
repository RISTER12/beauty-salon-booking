databaseChangeLog:
  - changeSet:
      id: create-employee-status-table
      author: Il'ia Kuz'min
      preConditions:
        - not:
            tableExists:
              tableName: employee_status
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: employee_status
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_employee_status
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: status_name
                  type: VARCHAR(255)
                  remarks: "active, inactive, vacation, sick_leave, dismissed"
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: "CURRENT_TIMESTAMP"
      rollback:
        - dropTable:
            tableName: employee_status