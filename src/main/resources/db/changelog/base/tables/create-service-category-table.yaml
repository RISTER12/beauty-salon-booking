databaseChangeLog:
  - changeSet:
      id: create-service-category-table
      author: Il'ia Kuz'min
      preConditions:
        - not:
            tableExists:
              tableName: service_category
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: service_category
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_service_category
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: category_name
                  type: VARCHAR(255)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: "CURRENT_TIMESTAMP"
      rollback:
        - dropTable:
            tableName: service_category