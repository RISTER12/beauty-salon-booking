databaseChangeLog:
  - changeSet:
      id: create-report-type-table
      author: Il'ia Kuz'min
      preConditions:
        - not:
            tableExists:
              tableName: report_type
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: report_type
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_report_type
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: type_name
                  type: VARCHAR(255)
                  remarks: "Например: daily, weekly, employee_summary, salon_summary"
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
      rollback:
        - dropTable:
            tableName: report_type