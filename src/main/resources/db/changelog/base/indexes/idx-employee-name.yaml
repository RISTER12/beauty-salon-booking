databaseChangeLog:
  - changeSet:
      id: idx-employee-name
      author: Il'ia Kuz'min
      changes:
        - createIndex:
            indexName: idx_employee_name
            tableName: employee
            columns:
              - column:
                  name: last_name
              - column:
                  name: first_name
      rollback:
        - dropIndex:
            indexName: idx_employee_name
            tableName: employee
