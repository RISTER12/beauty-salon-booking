databaseChangeLog:
  - changeSet:
      id: uk-employee_status-status_name
      author: Il'ia Kuz'min
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addUniqueConstraint:
            columnNames: status_name
            constraintName: UK_EMPLOYEE_STATUS_STATUS_NAME
            tableName: employee_status
      rollback:
        - dropUniqueConstraint:
            constraintName: UK_EMPLOYEE_STATUS_STATUS_NAME
            tableName: employee_status