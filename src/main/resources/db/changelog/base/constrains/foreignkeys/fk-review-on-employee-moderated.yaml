databaseChangeLog:
  - changeSet:
      id: fk-review-on-employee-moderated
      author: Il'ia Kuz'min
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: moderated_by_employee_id
            baseTableName: review
            constraintName: FK_REVIEW_ON_MODERATED_BY_EMPLOYEE
            referencedColumnNames: id
            referencedTableName: employee
            onUpdate: RESTRICT
            onDelete: SET NULL
      rollback:
          - dropForeignKeyConstraint:
                constraintName: FK_REVIEW_ON_MODERATED_BY_EMPLOYEE
                tableName: review