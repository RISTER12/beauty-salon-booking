databaseChangeLog:
  - changeSet:
      id: fk-service-on-salon
      author: Il'ia Kuz'min
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: salon_id
            baseTableName: service
            constraintName: FK_SERVICE_ON_SALON
            referencedColumnNames: id
            referencedTableName: salon
            onUpdate: RESTRICT
            onDelete: CASCADE
      rollback:
          - dropForeignKeyConstraint:
                constraintName: FK_SERVICE_ON_SALON
                tableName: service