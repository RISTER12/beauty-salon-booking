databaseChangeLog:
  - changeSet:
      id: fk-revenue-report-on-employee
      author: Il'ia Kuz'min
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: employee_id
            baseTableName: revenue_report
            constraintName: FK_REVENUE_REPORT_ON_EMPLOYEE
            referencedColumnNames: id
            referencedTableName: employee
            onUpdate: RESTRICT
            onDelete: SET NULL
      rollback:
          - dropForeignKeyConstraint:
                constraintName: FK_REVENUE_REPORT_ON_EMPLOYEE
                tableName: revenue_report