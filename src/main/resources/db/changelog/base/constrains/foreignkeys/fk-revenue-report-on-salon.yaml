databaseChangeLog:
  - changeSet:
      id: fk-revenue-report-on-salon
      author: Il'ia Kuz'min
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: salon_id
            baseTableName: revenue_report
            constraintName: FK_REVENUE_REPORT_ON_SALON
            referencedColumnNames: id
            referencedTableName: salon
            onUpdate: RESTRICT
            onDelete: SET NULL
      rollback:
          - dropForeignKeyConstraint:
                constraintName: FK_REVENUE_REPORT_ON_SALON
                tableName: revenue_report