databaseChangeLog:
  - changeSet:
      id: fk-promotion-service-on-service
      author: Il'ia Kuz'min
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: service_id
            baseTableName: promotion_service
            constraintName: FK-PROMOTION-SERVICE-ON-SERVICE
            referencedColumnNames: id
            referencedTableName: service
            onUpdate: RESTRICT
            onDelete: RESTRICT
      rollback:
          - dropForeignKeyConstraint:
                constraintName: FK-PROMOTION-SERVICE-ON-SERVICE
                tableName: promotion_service
