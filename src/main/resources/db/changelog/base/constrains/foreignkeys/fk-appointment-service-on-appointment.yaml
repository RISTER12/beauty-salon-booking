databaseChangeLog:
  - changeSet:
      id: fk-appointment-service-on-appointment
      author: Il'ia Kuz'min
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: appointment_id
            baseTableName: appointment_service
            constraintName: FK-APPOINTMENT-SERVICE-ON-APPOINTMENT
            referencedColumnNames: id
            referencedTableName: appointment
            onUpdate: RESTRICT
            onDelete: CASCADE
      rollback:
          - dropForeignKeyConstraint:
                constraintName: FK-APPOINTMENT-SERVICE-ON-APPOINTMENT
                tableName: appointment_service
