databaseChangeLog:
  - changeSet:
      id: fk-employee-on-salon
      author: Il'ia Kuz'min
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: salon_id
            baseTableName: employee
            constraintName: FK_EMPLOYEE_ON_SALON
            referencedColumnNames: id
            referencedTableName: salon
            onUpdate: RESTRICT
            onDelete: SET NULL
      rollback:
          - dropForeignKeyConstraint:
                constraintName: FK_EMPLOYEE_ON_SALON
                tableName: employee