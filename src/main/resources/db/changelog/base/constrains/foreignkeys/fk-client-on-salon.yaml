databaseChangeLog:
  - changeSet:
      id: fk-client-on-preferred-salon
      author: Il'ia Kuz'min
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: preferred_salon_id
            baseTableName: client
            constraintName: FK_CLIENT_ON_PREFERRED_SALON
            referencedColumnNames: id
            referencedTableName: salon
            onUpdate: RESTRICT
            onDelete: SET NULL
      rollback:
          - dropForeignKeyConstraint:
                constraintName: FK_CLIENT_ON_PREFERRED_SALON
                tableName: client